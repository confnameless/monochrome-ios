name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build archive
        run: |
          xcodebuild -scheme monochrome \
          -sdk iphoneos \
          -configuration Release \
          archive -archivePath build/monochrome.xcarchive \
          CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p build/ipa
          xcodebuild -exportArchive \
          -archivePath build/monochrome.xcarchive \
          -exportOptionsPlist /dev/null \
          -exportPath build/ipa \
          CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: monochrome-ipa
          path: build/ipa
